<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zzu.edu.cn</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            padding: 20px;
            background-color: #f5f5f5;
        }
        .pdf-container {
            width: 100%;
            height: 90vh; /* 占屏幕90%高度 */
            border: 1px solid #ccc;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
            color: #333;
        }
    </style>
</head>
<body>
    <h1>zzu.edu.cn</h1>
    <!-- 嵌入PDF -->
    <embed class="pdf-container" src="document.pdf" type="application/pdf">
</body>
</html>
